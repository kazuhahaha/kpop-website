<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-pop 音樂站</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <span class="nav-logo">🎵 K-pop 音樂站</span>
  <div class="nav-links">
    <a href="index.html" class="active">首頁</a>
    <a href="songs.html">推薦歌曲</a>
    <a href="idols.html">偶像介紹</a>
  </div>
  <div class="nav-right">
    <button id="darkToggle">🌙 Dark</button>
  </div>
</nav>

<div class="container page">
  <div class="hero fade-up">
    <div class="hero-badge">✨ K-POP MUSIC PLATFORM</div>
    <h1>探索 K-pop<br/>無限世界</h1>
    <p>偶像介紹 · 歌詞翻譯 · 同步歌詞 · 收藏管理</p>
    <a href="songs.html" class="btn-primary">開始探索 🔍</a>
  </div>

  <div class="section-title fade-up"><span>🔥</span> 本週 K-pop 熱門排行榜</div>
  
  <div class="top-3-grid fade-up" id="top3Container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px;"></div>

  <div id="indexSongList" class="fade-up"></div>

</div>

<script>
// 數據來源：與 songs.html 保持一致
const songsData = [
  { title: 'BOOMPALA', artist: 'LE SSERAFIM', url: 'https://www.youtube.com/watch?v=Gnn4GRSzRXI' },
  { title: 'Heavy Serenade', artist: 'NMIXX', url: 'https://youtu.be/6Ycn9qZK09I' },
  { title: 'It’s Me', artist: 'ILLIT', url: 'https://youtu.be/lOpdrEgmYzY' },
  { title: 'SPAGHETTI', artist: 'LE SSERAFIM', url: 'https://youtu.be/TvVtYaqCni8' },
  { title: 'HOT', artist: 'LE SSERAFIM', url: 'https://www.youtube.com/watch?v=r9AEGPB6qIU' }
];

function renderHome() {
  const top3 = document.getElementById('top3Container');
  const list = document.getElementById('indexSongList');
  const medals = ['🥇', '🥈', '🥉'];
  
  // 渲染 TOP 3
  songsData.slice(0, 3).forEach((song, i) => {
    top3.innerHTML += `
      <div class="card" style="padding:20px; text-align:center; cursor:pointer;" onclick="location.href='songs.html'">
        <div style="font-size: 24px;">${medals[i]}</div>
        <strong>${song.title}</strong>
      </div>`;
  });

  // 渲染其餘歌曲 (保持原有的 list-item 樣式)
  songsData.slice(3).forEach((song, i) => {
    list.innerHTML += `
      <div class="song-list-item fade-up" style="padding:15px; background:var(--surface); border-radius:12px; margin-bottom:10px; cursor:pointer; display:flex; align-items:center;" onclick="location.href='songs.html'">
        <div style="margin-right:15px; color:#ff4757; font-weight:bold;">#${i + 4}</div>
        <div class="song-info">
          <strong>${song.title}</strong><br><small style="color:var(--text2);">${song.artist}</small>
        </div>
      </div>`;
  });
}

renderHome();
</script>
<script src="script.js"></script>
</body>
</html>
