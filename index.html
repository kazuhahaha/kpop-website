<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-pop 音樂站</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <a href="index.html" style="text-decoration: none; color: inherit;">
    <span class="nav-logo">🎵 K-pop 音樂站</span>
  </a>
  <div class="nav-links">
    <a href="index.html" class="active">首頁</a>
    <a href="songs.html">推薦歌曲</a>
    <a href="idols.html">偶像介紹</a>
  </div>
  <div class="nav-right">
    <button id="darkToggle">🌙 Dark</button>
  </div>
</nav>

<div class="container page">
  <div class="hero fade-up">
    <div class="hero-badge">✨ K-POP MUSIC PLATFORM</div>
    <h1>探索 K-pop<br/>無限世界</h1>
    <a href="songs.html" class="btn-primary">開始探索 🔍</a>
  </div>

  <div class="section-title fade-up"><span>🔥</span> 本週 K-pop 熱門排行榜</div>
  <div class="top-3-grid fade-up" id="top3Container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px;"></div>
  <div id="indexSongList" class="fade-up"></div>

  <div class="section-title fade-up" style="margin-top: 40px;"><span>✨</span> 主推女團</div>
  <div class="idols-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;">
    <div class="card idol-card fade-up">
      <img src="images/lesf.jpg" alt="LE SSERAFIM" onerror="this.style.display='none'" />
      <h3>LE SSERAFIM</h3>
      <p>I'm Fearless 🔥 打造新世代強勢女子團體</p>
      <a href="idols.html" class="btn-sm">看更多 →</a>
    </div>
    <div class="card idol-card fade-up">
      <img src="images/njz.jpg" alt="NewJeans" onerror="this.style.display='none'" />
      <h3>NewJeans</h3>
      <p>高人氣青春風格，連結潮流文化 💙</p>
      <a href="idols.html" class="btn-sm">看更多 →</a>
    </div>
    <div class="card idol-card fade-up">
      <img src="images/aespa.jpg" alt="aespa" onerror="this.style.display='none'" />
      <h3>aespa</h3>
      <p>現實 × 虛擬世界的獨特設定 🌐</p>
      <a href="idols.html" class="btn-sm">看更多 →</a>
    </div>
  </div>
</div>

<script>
const songsData = [
  { title: 'BOOMPALA', artist: 'LE SSERAFIM', url: '#' },
  { title: 'Heavy Serenade', artist: 'NMIXX', url: '#' },
  { title: 'It’s Me', artist: 'ILLIT', url: '#' },
  { title: 'REDRED', artist: ' CORTIS ', url: 'https://www.youtube.com/watch?v=U6BDbXIah-Y' },
  { title: 'Catch Catch', artist: 'YENA', url: 'https://www.youtube.com/watch?v=NOiyDlWl534' }
];

function renderHome() {
  const top3 = document.getElementById('top3Container');
  const list = document.getElementById('indexSongList');
  const medals = ['🥇', '🥈', '🥉'];
  
  // 渲染 TOP 3
  songsData.slice(0, 3).forEach((song, i) => {
    top3.innerHTML += `
      <div class="card" style="padding:20px; text-align:center; cursor:pointer;" onclick="location.href='songs.html'">
        <div style="font-size: 24px;">${medals[i]}</div>
        <strong>${song.title}</strong>
      </div>`;
  });

  // 渲染其餘歌曲
  songsData.slice(3).forEach((song, i) => {
    list.innerHTML += `
      <div class="song-list-item fade-up" style="padding:15px; background:var(--surface); border-radius:12px; margin-bottom:10px; cursor:pointer; display:flex; align-items:center;" onclick="location.href='songs.html'">
        <div style="margin-right:15px; color:#ff4757; font-weight:bold;">#${i + 4}</div>
        <div class="song-info">
          <strong>${song.title}</strong><br><small>${song.artist}</small>
        </div>
      </div>`;
  });
}
renderHome();
</script>
<script src="script.js"></script>
</body>
</html>
