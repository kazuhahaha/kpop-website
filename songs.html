<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎵 推薦歌曲 - K-pop 音樂站</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <span class="nav-logo">🎵 K-pop 音樂站</span>
  <div class="nav-links">
    <a href="index.html">首頁</a>
    <a href="songs.html" class="active">推薦歌曲</a>
    <a href="idols.html">偶像介紹</a>
  </div>
  <div class="nav-right">
    <button id="darkToggle">🌙 Dark</button>
  </div>
</nav>

<div class="container page">

  <div class="section-title fade-up"><span>🎵</span> 推薦歌曲</div>

  <div class="search-bar fade-up">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜尋歌曲或團體名稱..." oninput="filterSongs()" />
  </div>

  <div class="favs-section fade-up" id="favsSection">
    <div class="section-title" style="margin-bottom:12px;"><span>⭐</span> 我的收藏歌曲</div>
    <div class="card" id="favsContainer">
      <div class="fav-empty" id="favEmpty">還沒有收藏歌曲，點擊 ❤️ 加入收藏！</div>
    </div>
  </div>

  <div class="player-layout fade-up">
    <div class="card mv-player-card" style="text-align: center; display: flex; flex-direction: column; justify-content: center; min-height: 250px;">
      <div class="now-playing-info">
        <div class="now-playing-label">▶ NOW PLAYING</div>
        <div class="now-playing-title" id="npTitle">請從下方選擇一首歌曲</div>
        <div class="now-playing-artist" id="npArtist">-</div>
      </div>
      <a id="ytBtn" href="#" target="_blank" class="fav-btn" style="display: none; margin: 20px auto; padding: 10px 20px; text-decoration: none; background: #ff0000; color: white; border-radius: 20px; font-weight: bold;">
        📺 前往 YouTube 觀看
      </a>
    </div>
  </div>

  <div class="section-title fade-up"><span>🔥</span> 歌曲列表</div>
  <div id="songList" style="margin-bottom:40px;"></div>

</div>

<footer>© 2025 K-pop 專題小組｜Weverse 風格升級版</footer>

];

function renderSongList(list) {
  const container = document.getElementById('songList');
  container.innerHTML = '';
  list.forEach((song) => {
    const item = document.createElement('div');
    item.className = 'song-list-item fade-up';
    item.innerHTML = `
      <div class="song-info">
        <div class="song-name">${song.title}</div>
        <div class="song-artist">${song.artist}</div>
      </div>
    `;
    item.onclick = () => {
      document.getElementById('npTitle').textContent = song.title;
      document.getElementById('npArtist').textContent = song.artist;
      const btn = document.getElementById('ytBtn');
      btn.href = song.url;
      btn.style.display = 'inline-block';
    };
    container.appendChild(item);
  });
}

function filterSongs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = songsData.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
  renderSongList(filtered);
}

// Dark Mode 與其他初始化邏輯保持不變
document.getElementById('darkToggle').addEventListener('click', () => {
  document.body.classList.toggle('dark');
  localStorage.setItem('kpop_dark', document.body.classList.contains('dark'));
});

if(localStorage.getItem('kpop_dark') === 'true') document.body.classList.add('dark');
renderSongList(songsData);
</script>
</body>
</html>
