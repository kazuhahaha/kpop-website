    .song-list-item { display: flex; align-items: center; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; border-radius: 12px; border: 1px solid #eee; }
    .song-list-item:hover { transform: translateX(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .song-index { font-weight: bold; color: #ff4757; margin-right: 15px; width: 30px; }
    .active-song { border-left: 5px solid #ff4757; background: #fff5f5; }
    .playing-icon { display: none; margin-left: auto; color: #ff4757; font-weight: bold; }
    .active-song .playing-icon { display: block; }
    #songThumbnail { width: 100%; max-width: 250px; margin: 15px auto; border-radius: 12px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
  </style>

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const container = document.getElementById('songList');
  container.innerHTML = '';
  songsData.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)).forEach((song, i) => {
    const item = document.createElement('div');
    item.className = 'song-list-item fade-up';
    item.innerHTML = `<div class="song-index">${i + 1}</div><div><strong>${song.title}</strong><br><small>${song.artist}</small></div><div class="playing-icon">🔊</div>`;
    item.onclick = () => {
      document.querySelectorAll('.song-list-item').forEach(el => el.classList.remove('active-song'));
      item.classList.add('active-song');
      document.getElementById('npTitle').textContent = song.title;
      document.getElementById('npArtist').textContent = song.artist;
      const thumb = document.getElementById('songThumbnail');
      thumb.src = song.img; thumb.style.display = 'block';
      const btn = document.getElementById('ytBtn');
      btn.href = song.url; btn.style.display = 'inline-block';
    };
    container.appendChild(item);
  });
}

document.getElementById('darkToggle').addEventListener('click', () => document.body.classList.toggle('dark'));
renderList();
</script>
