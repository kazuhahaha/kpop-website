<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎵 推薦歌曲 - K-pop 音樂站</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* 新增的優化樣式 */
    .song-list-item { 
      display: flex; align-items: center; padding: 15px; margin-bottom: 10px;
      background: white; border-radius: 12px; cursor: pointer;
      transition: all 0.3s ease; border: 1px solid #eee;
    }
    .song-list-item:hover { transform: translateX(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .song-index { font-weight: bold; color: #ff4757; margin-right: 15px; width: 30px; }
    .playing-icon { display: none; margin-left: auto; color: #ff4757; font-weight: bold; }
    .active-song .playing-icon { display: block; }
    .active-song { border-left: 5px solid #ff4757; }
    .dark .song-list-item { background: #2d2d2d; border: none; }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">🎵 K-pop 音樂站</span>
  <div class="nav-links">
    <a href="index.html">首頁</a>
    <a href="songs.html" class="active">推薦歌曲</a>
    <a href="idols.html">偶像介紹</a>
  </div>
  <div class="nav-right">
    <button id="darkToggle">🌙 Dark</button>
  </div>
</nav>

<div class="container page">
  <div class="section-title fade-up"><span>🎵</span> 推薦歌曲</div>
  
  <div class="player-layout fade-up">
    <div class="card mv-player-card" style="text-align: center; padding: 30px;">
      <div class="now-playing-label">▶ NOW PLAYING</div>
      <div class="now-playing-title" id="npTitle" style="font-size: 22px; margin: 10px 0;">請從列表選擇一首歌曲</div>
      <div class="now-playing-artist" id="npArtist" style="color: #666;">-</div>
      <a id="ytBtn" href="#" target="_blank" class="fav-btn" style="display: none; margin-top: 20px; padding: 12px 25px; background: #ff4757; color: white; border-radius: 25px; text-decoration: none; font-weight: bold;">
        📺 前往 YouTube 觀看
      </a>
    </div>
  </div>

  <div class="section-title fade-up"><span>🔥</span> 歌曲列表</div>
  <div id="songList" style="margin-bottom:40px;"></div>
</div>

<script>
const songsData = [
  { title: 'BOOMPALA', artist: 'LE SSERAFIM', url: 'https://www.youtube.com/watch?v=Gnn4GRSzRXI' },
  { title: 'Heavy Serenade', artist: 'NMIXX', url: 'https://youtu.be/6Ycn9qZK09I' },
  { title: 'It’s Me', artist: 'ILLIT', url: 'https://youtu.be/lOpdrEgmYzY' },
  { title: 'SPAGHETTI', artist: 'LE SSERAFIM', url: 'https://youtu.be/TvVtYaqCni8' },
  { title: 'HOT', artist: 'LE SSERAFIM', url: 'https://www.youtube.com/watch?v=r9AEGPB6qIU' },
  { title: 'CRAZY', artist: 'LE SSERAFIM', url: 'https://www.youtube.com/watch?v=n6B5gQXlB-0' },
  { title: 'EASY', artist: 'LE SSERAFIM', url: 'https://www.youtube.com/watch?v=qEW5IPfGLUI' },
  { title: 'Perfect Night', artist: 'LE SSERAFIM', url: 'https://www.youtube.com/watch?v=hLvWy2b857I' },
  { title: 'Eve, Psyche & the Bluebeard’s wife', artist: 'LE SSERAFIM', url: 'https://www.youtube.com/watch?v=dZs_cLHfnNA' },
  { title: 'UNFORGIVEN', artist: 'LE SSERAFIM', url: 'https://www.youtube.com/watch?v=UBURTj20HXI' },
  { title: 'FEARLESS', artist: 'LE SSERAFIM', url: 'https://youtu.be/4vbDFu0PUew' },
  { title: 'Black Mamba', artist: 'aespa', url: 'https://youtu.be/ZeerrnuLi5E' },
  { title: 'Next Level', artist: 'aespa', url: 'https://youtu.be/4TWR90KJl84' },
  { title: 'Savage', artist: 'aespa', url: 'https://youtu.be/WPdWvnAAurg' },
  { title: 'Girls', artist: 'aespa', url: 'https://youtu.be/dYRITmpFbJ4' },
  { title: 'Spicy', artist: 'aespa', url: 'https://youtu.be/Os_heh8vPfs' },
  { title: 'Drama', artist: 'aespa', url: 'https://youtu.be/D8VEhcPeSlc' },
  { title: 'Supernova', artist: 'aespa', url: 'https://youtu.be/phuiiNCxRMg' },
  { title: 'Whiplash', artist: 'aespa', url: 'https://youtu.be/jWQx2f-CErU' },
  { title: 'Dirty Work', artist: 'aespa', url: 'https://youtu.be/M2WTUoy4y6E' },
  { title: 'Rich Man', artist: 'aespa', url: 'https://youtu.be/5oQVTnq-UKk' },
  { title: 'Attention', artist: 'NewJeans', url: 'https://youtu.be/js1CtxSY38I' },
  { title: 'Hype Boy', artist: 'NewJeans', url: 'https://youtu.be/11cta61wi0g' },
  { title: 'Cookie', artist: 'NewJeans', url: 'https://youtu.be/VOmIplFAGeg' },
  { title: 'Ditto', artist: 'NewJeans', url: 'https://youtu.be/Km71Rr9K-Bw' },
  { title: 'OMG', artist: 'NewJeans', url: 'https://youtu.be/sVTy_wmn5SU' },
  { title: 'Super Shy', artist: 'NewJeans', url: 'https://youtu.be/ArmDp-zijuc' },
  { title: 'ETA', artist: 'NewJeans', url: 'https://youtu.be/jOTfBlKSQYY' },
  { title: 'How Sweet', artist: 'NewJeans', url: 'https://youtu.be/Q3K0TOvTOno' }
];

function renderSongList() {
  const container = document.getElementById('songList');
  container.innerHTML = '';
  songsData.forEach((song, i) => {
    const item = document.createElement('div');
    item.className = 'song-list-item fade-up';
    item.innerHTML = `
      <div class="song-index">${i + 1}</div>
      <div class="song-info">
        <div class="song-name">${song.title}</div>
        <div class="song-artist">${song.artist}</div>
      </div>
      <div class="playing-icon">🔊 播放中</div>
    `;
    item.onclick = () => {
      // 更新顯示
      document.querySelectorAll('.song-list-item').forEach(el => el.classList.remove('active-song'));
      item.classList.add('active-song');
      
      document.getElementById('npTitle').textContent = song.title;
      document.getElementById('npArtist').textContent = song.artist;
      
      const btn = document.getElementById('ytBtn');
      btn.href = song.url;
      btn.style.display = 'inline-block';
    };
    container.appendChild(item);
  });
}

document.getElementById('darkToggle').addEventListener('click', () => {
  document.body.classList.toggle('dark');
});

renderSongList();
</script>
</body>
</html>
