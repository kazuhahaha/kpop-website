    ]

];
 
/* ── 狀態 ── */
let currentSongIndex = 0;
let lyricTimer = null;
let mockTime = 0;
let isPlaying = false;
 
/* ── 渲染歌曲列表 ── */
function renderSongList(filtered) {
  const list = filtered ?? songsData;
  const container = document.getElementById('songList');
  container.innerHTML = '';
 
  if (list.length === 0) {
    container.innerHTML = '<p style="text-align:center;color:var(--text3);padding:24px;">找不到符合的歌曲 😢</p>';
    return;
  }
 
  list.forEach((song, idx) => {
    const realIdx = songsData.indexOf(song);
    const isFav = getFavs().includes(song.id);
    const isActive = realIdx === currentSongIndex;
 
    const item = document.createElement('div');
    item.className = `song-list-item fade-up${isActive ? ' active-song' : ''}`;
    item.innerHTML = `
      <div class="song-num">${idx + 1}</div>
      <div class="song-info">
        <div class="song-name">${song.title}</div>
        <div class="song-artist">${song.artist}</div>
      </div>
      <button class="fav-btn${isFav ? ' active' : ''}" onclick="toggleFav(event, ${song.id})" title="收藏">
        ${isFav ? '❤️' : '🤍'}
      </button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.classList.contains('fav-btn')) return;
      loadSong(realIdx);
    });
    container.appendChild(item);
  });
}
 
/* ── 載入歌曲 ── */
function loadSong(idx) {
  currentSongIndex = idx;
  const song = songsData[idx];
 
  // 更新 iframe
  const iframe = document.getElementById('mvPlayer');
  iframe.src = `https://www.youtube.com/embed/${song.youtubeId}?autoplay=1&enablejsapi=1&origin=https://kazuhahaha.github.io`;
 
  // 更新 Now Playing
  document.getElementById('npTitle').textContent = song.title;
  document.getElementById('npArtist').textContent = song.artist;
 
  // 渲染歌詞
  renderLyrics(song);
 
  // 重設計時器
  clearInterval(lyricTimer);
  mockTime = 0;
  isPlaying = true;
  startLyricSync(song);
 
  // 更新列表 active 狀態
  renderSongList(null);
}
 
/* ── 渲染歌詞 ── */
function renderLyrics(song) {
  const container = document.getElementById('lyricsContainer');
  container.innerHTML = '';
  song.lyrics.forEach((line, i) => {
    const div = document.createElement('div');
    div.className = 'lyric-line';
    div.id = `lyric-${i}`;
    div.innerHTML = `
      <div class="lyric-kr">${line.kr}</div>
      <div class="lyric-zh">${line.zh}</div>
    `;
    // 點擊歌詞跳到對應時間
    div.addEventListener('click', () => {
      mockTime = line.time;
      updateActiveLyric(song, mockTime);
    });
    container.appendChild(div);
  });
}
 
/* ── 同步歌詞（用 setInterval 模擬時間推進） ── */
function startLyricSync(song) {
  lyricTimer = setInterval(() => {
    if (!isPlaying) return;
    mockTime++;
    updateActiveLyric(song, mockTime);
  }, 1000);
}
 
function updateActiveLyric(song, time) {
  const lines = document.querySelectorAll('.lyric-line');
  let activeIdx = -1;
 
  // 找到目前應該高亮的歌詞
  song.lyrics.forEach((line, i) => {
    if (time >= line.time) activeIdx = i;
  });
 
  lines.forEach((el, i) => {
    el.classList.remove('active', 'past');
    if (i === activeIdx) {
      el.classList.add('active');
      // 自動捲動
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (i < activeIdx) {
      el.classList.add('past');
    }
  });
}
 
/* ── 搜尋過濾 ── */
function filterSongs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = songsData.filter(s =>
    s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)
  );
  renderSongList(filtered);
}
 
/* ── 收藏功能 ── */
function getFavs() {
  return JSON.parse(localStorage.getItem('kpop_favs') || '[]');
}
function saveFavs(favs) {
  localStorage.setItem('kpop_favs', JSON.stringify(favs));
}
function toggleFav(e, songId) {
  e.stopPropagation();
  let favs = getFavs();
  if (favs.includes(songId)) {
    favs = favs.filter(id => id !== songId);
  } else {
    favs.push(songId);
  }
  saveFavs(favs);
  renderSongList(null);
  renderFavs();
}
function removeFav(songId) {
  let favs = getFavs().filter(id => id !== songId);
  saveFavs(favs);
  renderSongList(null);
  renderFavs();
}
function renderFavs() {
  const favs = getFavs();
  const container = document.getElementById('favsContainer');
  const empty = document.getElementById('favEmpty');
 
  // 清除舊的 tag（保留 empty 訊息元素）
  Array.from(container.querySelectorAll('.fav-tag')).forEach(el => el.remove());
 
  if (favs.length === 0) {
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
 
  favs.forEach(id => {
    const song = songsData.find(s => s.id === id);
    if (!song) return;
    const tag = document.createElement('span');
    tag.className = 'fav-tag';
    tag.innerHTML = `❤️ ${song.title} <span style="color:var(--text2);font-size:11px;"> – ${song.artist}</span> <span class="rm" onclick="removeFav(${song.id})">✕</span>`;
    tag.addEventListener('click', (e) => {
      if (e.target.classList.contains('rm')) return;
      loadSong(songsData.indexOf(song));
    });
    container.appendChild(tag);
  });
}
 
/* ── Dark Mode ── */
function initDark() {
  const saved = localStorage.getItem('kpop_dark');
  if (saved === 'true') {
    document.body.classList.add('dark');
    document.getElementById('darkToggle').textContent = '☀️ Light';
  }
}
document.getElementById('darkToggle').addEventListener('click', () => {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('kpop_dark', isDark);
  document.getElementById('darkToggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
});
 
/* ── 初始化 ── */
initDark();
renderSongList(null);
renderFavs();
loadSong(0);   // 預設載入第一首
 
/* 頁面離開時清除計時器 */
window.addEventListener('beforeunload', () => clearInterval(lyricTimer));
</script>
